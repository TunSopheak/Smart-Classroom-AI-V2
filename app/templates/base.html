<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Classroom AI Monitoring V2{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div>
            <p class="eyebrow">Version 2</p>
            <h1>Smart Classroom AI Monitoring</h1>
        </div>
        <nav class="main-nav" aria-label="Main navigation">
            <div class="nav-group">
                <a href="/dashboard">Dashboard</a>
                <a href="/qr-scanner">QR Scanner</a>
                <a href="/attendance">Attendance</a>
                <a href="/sessions">Sessions</a>
                <a href="/ai-monitoring">AI Monitoring</a>
                <a href="/ai-events">AI Events</a>
            </div>
            <details class="nav-menu">
                <summary>Academic</summary>
                <div class="nav-menu-panel">
                    <a href="/classes">Classes</a>
                    <a href="/students">Students</a>
                    <a href="/enrollments">Enrollments</a>
                    <a href="/teachers">Teachers</a>
                    <a href="/subjects">Subjects</a>
                    <a href="/schedules">Schedules</a>
                </div>
            </details>
            <details class="nav-menu">
                <summary>System</summary>
                <div class="nav-menu-panel">
                    <a href="/docs">API Docs</a>
                </div>
            </details>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
